<!DOCTYPE html>
<html>
<head>
    <title>WotterWatch Live GPS Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        #map-container {
            height: 100%;
        }

        #live-map {
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* TOP BAR */
        #title-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background-color: #333;
            color: white;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.1em;
        }

        #logo {
            height: 55px;
            width: auto;
        }

        /* WATER BAR */
        #water-bar {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            padding: 10px;
            background-color: #444;
            color: white;
            z-index: 100;
            text-align: center;
            font-size: 1em;
        }

        /* BUTTONS */
        #gmaps-btn {
            position: absolute;
            top: 115px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        #gmaps-btn:disabled {
            background: gray;
            cursor: not-allowed;
        }

        /* SOS BUTTON */
        #sos-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 12px 25px;
            background: red;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #sos-btn:hover {
            background: darkred;
        }
    </style>
</head>

<body>

    <!-- TITLE + LOGO -->
    <div id="title-bar">
        <img id="logo" src="wotterwatch.png" alt="Logo">
        <span>WotterWatch Live Tracker</span>
        <span id="current-coords">Awaiting Data...</span>
    </div>

    <!-- WATER STATUS -->
    <div id="water-bar">
        Water Status: <span id="water-status">Loading...</span>
    </div>

    <!-- BUTTONS -->
    <button id="gmaps-btn" disabled onclick="openGoogleMaps()">
        Open in Google Maps
    </button>

    <button id="sos-btn" onclick="triggerSOS()">
        🆘 SOS EMERGENCY
    </button>

    <div id="map-container">
        <iframe id="live-map" src="" allowfullscreen></iframe>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <script>
        const CHANNEL_ID = 3341325;
        const READ_API_KEY = "A3SHG2QUYQZLZU5J";

        const TS_API_URL =
            "https://api.thingspeak.com/channels/" +
            CHANNEL_ID +
            "/feeds/last.json?api_key=" +
            READ_API_KEY;

        const UPDATE_INTERVAL = 10000;

        window.latestLat = null;
        window.latestLng = null;

        // OPEN GOOGLE MAPS
        function openGoogleMaps() {
            if (window.latestLat !== null && window.latestLng !== null) {
                const url = `https://www.google.com/maps?q=${window.latestLat},${window.latestLng}`;
                window.open(url, "_blank");
            }
        }

        // SOS BUTTON ACTION
        function triggerSOS() {
            if (window.latestLat !== null && window.latestLng !== null) {
                const url = `https://www.google.com/maps?q=${window.latestLat},${window.latestLng}`;
                
                alert("🚨 SOS Activated! Opening location.");

                window.open(url, "_blank");

                // Optional: you could also send alert to server here
                // fetch("/sos?lat=" + window.latestLat + "&lng=" + window.latestLng);
            } else {
                alert("No GPS signal available yet.");
            }
        }

        function fetchAndRefreshMap() {

            $.getJSON(TS_API_URL, function(data) {

                // ================= GPS =================
                const lat = parseFloat(data.field1);
                const lng = parseFloat(data.field2);

                if (!isNaN(lat) && !isNaN(lng)) {

                    window.latestLat = lat;
                    window.latestLng = lng;

                    document.getElementById("gmaps-btn").disabled = false;

                    const pos = `${lat},${lng}`;

                    const mapURL =
                        "https://maps.google.com/maps?q=" +
                        pos +
                        "&z=14&output=embed";

                    $("#live-map").attr("src", mapURL);
                    document.getElementById("current-coords").innerText = pos;

                } else {
                    document.getElementById("current-coords").innerText =
                        "Waiting for valid GPS data...";
                }

                // ================= WATER SENSOR =================
                const water = data.field3;

                if (water === "1") {
                    document.getElementById("water-status").innerText =
                        "💧 WATER DETECTED";
                    document.getElementById("water-bar").style.backgroundColor = "red";
                }
                else if (water === "0") {
                    document.getElementById("water-status").innerText =
                        "✅ NO WATER";
                    document.getElementById("water-bar").style.backgroundColor = "#444";
                }
                else {
                    document.getElementById("water-status").innerText =
                        "Unknown";
                }

            }).fail(function() {
                console.error("ThingSpeak connection failed.");
                document.getElementById("current-coords").innerText =
                    "ERROR connecting to ThingSpeak";
            });
        }

        $(document).ready(function() {
            fetchAndRefreshMap();
            setInterval(fetchAndRefreshMap, UPDATE_INTERVAL);
        });
    </script>

</body>
</html>
