<!DOCTYPE html>
<html>
<head>
    <title>WotterWatch GPS Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #title-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background: #333;
            color: white;
            text-align: center;
            z-index: 1000;
        }

        #water-bar {
            position: absolute;
            top: 45px;
            left: 0;
            right: 0;
            padding: 10px;
            background: #444;
            color: white;
            text-align: center;
            z-index: 1000;
        }

        #map-container {
            height: 100%;
        }

        #live-map {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>

<body>

    <div id="title-bar">
        Live Location: <span id="coords">Loading...</span>
    </div>

    <div id="water-bar">
        Water Status: <span id="water-status">Loading...</span>
    </div>

    <div id="map-container">
        <iframe id="live-map"></iframe>
    </div>

    <script>
        // ================= THINGSPEAK SETTINGS =================
        const CHANNEL_ID = 3341325;
        const READ_API_KEY = "A3SHG2QUYQZLZU5J";

        const URL = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds/last.json?api_key=${READ_API_KEY}`;

        const UPDATE_INTERVAL = 20000;

        function updateData() {
            fetch(URL)
                .then(res => res.json())
                .then(data => {

                    // ================= GPS =================
                    const lat = parseFloat(data.field1);
                    const lng = parseFloat(data.field2);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const pos = `${lat},${lng}`;

                        document.getElementById("coords").innerText = pos;

                        const mapURL =
                            `https://maps.google.com/maps?q=${pos}&z=15&output=embed`;

                        document.getElementById("live-map").src = mapURL;
                    } else {
                        document.getElementById("coords").innerText = "No GPS data";
                    }

                    // ================= WATER SENSOR =================
                    const water = data.field3;

                    if (water == "1") {
                        document.getElementById("water-status").innerText = "WATER DETECTED";
                        document.getElementById("water-bar").style.background = "red";
                    } else if (water == "0") {
                        document.getElementById("water-status").innerText = "NO WATER";
                        document.getElementById("water-bar").style.background = "#444";
                    } else {
                        document.getElementById("water-status").innerText = "Unknown";
                    }

                })
                .catch(err => {
                    console.error("ThingSpeak error:", err);
                });
        }

        // Initial load
        updateData();

        // Auto refresh
        setInterval(updateData, UPDATE_INTERVAL);
    </script>

</body>
</html>
